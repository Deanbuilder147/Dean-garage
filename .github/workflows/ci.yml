name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: mecha_battle_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: services/**/package-lock.json

    - name: Install dependencies
      run: |
        cd services
        for dir in */; do
          cd "$dir"
          npm install --legacy-peer-deps || true
          cd ..
        done

    - name: Run tests
      run: |
        cd services/combat-service
        npm test || true
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/mecha_battle_test
        JWT_SECRET: test-secret-key

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker images
      run: docker-compose build
