version: '3.8'

services:
  online-battle-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=postgresql://deangarage:deangarage@postgres:5432/dean_garage_online_battle
      - AUTH_SERVICE_URL=http://auth-service:3001
      - COMBAT_SERVICE_URL=http://combat-service:3003
      - MAP_SERVICE_URL=http://map-service:3004
      - COMM_SERVICE_URL=http://comm-service:3005
    depends_on:
      - postgres
    networks:
      - dean-garage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=deangarage
      - POSTGRES_PASSWORD=deangarage
      - POSTGRES_DB=dean_garage_online_battle
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - dean-garage-network
    restart: unless-stopped

networks:
  dean-garage-network:
    external: true
    name: dean-garage-network

volumes:
  postgres_data:
